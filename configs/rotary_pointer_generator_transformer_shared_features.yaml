class_path: yoyodyne.models.RotaryPointerGeneratorTransformerModel
init_args:
  source_encoder:
    class_path: yoyodyne.models.modules.RotaryTransformerEncoder
    init_args:
      dropout: ${init_args.decoder_dropout}
      embedding_size: ${init_args.embedding_size}
      hidden_size: ${init_args.decoder_hidden_size}
      layers: ${init_args.decoder_layers}
  features_encoder: true
  decoder_dropout: .3
  decoder_hidden_size: 1024
  decoder_layers: 4
  embedding_size: 256
  optimizer:
    class_path: torch.optim.Adam
    init_args:
      lr: .001
  scheduler:
    class_path: yoyodyne.schedulers.WarmupInverseSquareRoot
    init_args:
      warmup_epochs: 10
